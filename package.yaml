name: molten
version: 0.1.0.0
github: "pe200012/molten"
license: BSD-3-Clause
author: "pe200012"
maintainer: "1326263755@qq.com"
copyright: "2026 pe200012"

extra-source-files:
- README.md
- CHANGELOG.md
- docs/plans/2026-03-08-molten-highlevel-rocm-design.md
- docs/plans/2026-03-08-molten-highlevel-rocm-implementation.md
- docs/plans/2026-03-08-molten-massiv-adapter-design.md
- docs/plans/2026-03-08-molten-massiv-adapter-implementation.md
- docs/plans/2026-03-08-molten-array-program-runtime-design.md
- docs/plans/2026-03-08-molten-array-program-runtime-implementation.md
- docs/plans/2026-03-08-molten-cpu-reference-evaluator-design.md
- docs/plans/2026-03-08-molten-cpu-reference-evaluator-implementation.md

description: Please see the README on GitHub at <https://github.com/pe200012/molten#readme>

dependencies:
- base >= 4.18 && < 5
- bytestring
- containers
- massiv
- mtl
- rocm-ffi-core
- rocm-hip-runtime
- rocm-rocblas
- rocm-rocfft
- rocm-rocrand
- vector

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

default-extensions:
- GADTs
- DataKinds
- KindSignatures
- RankNTypes
- ScopedTypeVariables
- TypeApplications
- TypeFamilies

library:
  source-dirs: src
  exposed-modules:
  - Molten
  - Molten.Array.Device
  - Molten.Array.Expr
  - Molten.Array.Program
  - Molten.Array.Runtime
  - Molten.Array.Transfer
  - Molten.BLAS
  - Molten.BLAS.Native
  - Molten.BLAS.Types
  - Molten.Core.Buffer
  - Molten.Core.Context
  - Molten.Core.Event
  - Molten.Core.Future
  - Molten.Core.Stream
  - Molten.Core.Transfer
  - Molten.FFT
  - Molten.FFT.Runtime
  - Molten.Internal.HIPRTC
  - Molten.Internal.Scheduler
  - Molten.Interop.Massiv
  - Molten.Interop.Vector
  - Molten.RAND
  - Molten.RAND.Runtime
  - Molten.Reference

executables:
  molten-exe:
    main: Main.hs
    source-dirs: app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - molten

tests:
  molten-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - molten
    - hspec
